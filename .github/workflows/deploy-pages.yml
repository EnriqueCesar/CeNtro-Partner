name: Deploy CeNtro Partner to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias limpias
        run: |
          rm -rf node_modules
          npm install --package-lock=false --include=dev --no-audit --no-fund

      - name: Verificar dependencias esenciales
        run: |
          test -d node_modules/react
          test -d node_modules/react-dom
          test -d node_modules/typescript
          test -d node_modules/vite
          test -d node_modules/xlsx

      - name: Validar TypeScript
        run: npm run check

      - name: Compilar aplicacion
        run: npm run build

      - name: Validar salida de produccion
        run: |
          test -f dist/index.html
          test -d dist/assets
          test -f "dist/data/Base_CeNtro Partner.xlsx"
          ! grep -q '/src/main.tsx' dist/index.html
          ! grep -q '%BASE_URL%' dist/index.html
          touch dist/.nojekyll

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir aplicacion compilada
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
