<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#006241" />
  <meta name="description" content="CeNtro Partner · Ranking regional Ops + RH" />
  <link rel="icon" href="/CeNtro-Partner/icons/icon-192.png" />
  <title>CeNtro Partner</title>
  <style>
    #boot-fallback{font-family:Inter,Arial,sans-serif;min-height:100vh;display:grid;place-items:center;background:#f8fafc;color:#0f172a;padding:24px}
    #boot-fallback>div{max-width:620px;background:#fff;border:1px solid #dbe3e8;border-radius:24px;padding:32px;text-align:center}
    #boot-fallback h1{color:#006241;margin:0 0 12px;font-size:28px}#boot-fallback p{line-height:1.6;color:#475569}
  </style>
  <script>
    (function(){
      var key='centro-partner-cache-reset-v2.1';
      if(localStorage.getItem(key)) return;
      localStorage.setItem(key,'1');
      if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(items){return Promise.all(items.map(function(item){return item.unregister()}))}).catch(function(){})}
      if('caches' in window){caches.keys().then(function(keys){return Promise.all(keys.map(function(name){return caches.delete(name)}))}).catch(function(){})}
    })();
  </script>
</head>
<body>
  <div id="root">
    <main id="boot-fallback"><div><h1>CeNtro Partner</h1><p>Iniciando aplicación…</p></div></main>
  </div>
  <script>
    window.__CENTRO_BOOT_TIMER__=setTimeout(function(){
      var fallback=document.getElementById('boot-fallback');
      if(fallback)fallback.innerHTML='<div><h1>No fue posible iniciar</h1><p>Actualiza la página para descargar la versión más reciente.</p><button onclick="location.reload()" style="border:0;border-radius:12px;background:#006241;color:#fff;padding:12px 18px;font-weight:700;cursor:pointer">Reintentar</button></div>';
    },12000);
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
